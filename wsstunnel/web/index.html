<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wsstunnel - Web 终端</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
  #terminal { width: 100vw; height: 100vh; padding: 8px; }
  #terminal .xterm { height: 100%; }
  #terminal .xterm-viewport { height: 100% !important; }
  #top-bar {
    position: fixed; top: 0; right: 0;
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px; z-index: 10;
  }
  #status {
    font: 12px monospace;
    background: #e74c3c; color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
  }
  #status.connected { background: #2ecc71; }
  #backend-select {
    font: 12px/1.5 Menlo, Monaco, monospace;
    background: #16213e; color: #eee;
    border: 1px solid #0f3460; border-radius: 4px;
    padding: 2px 6px; outline: none;
    cursor: pointer;
  }
  #backend-select:disabled { opacity: 0.4; cursor: default; }
  #connect-form {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 16px;
    font-family: system-ui, sans-serif;
    color: #ccc;
  }
  #connect-form input, #connect-form button {
    padding: 10px 16px; font-size: 16px;
    border: 1px solid #444; border-radius: 6px;
    background: #16213e; color: #eee; width: 320px;
  }
  #connect-form button {
    background: #0f3460; color: #fff;
    cursor: pointer; font-weight: bold;
  }
  #connect-form button:hover { background: #1a4a8a; }
  .hidden { display: none !important; }
  #error { color: #e74c3c; font-size: 14px; }
  #clear-btn {
    position: fixed; bottom: 10px; right: 10px;
    background: #333; color: #999; border: none;
    border-radius: 4px; padding: 4px 10px;
    font: 12px system-ui, sans-serif;
    cursor: pointer; z-index: 20;
    opacity: 0.5; transition: opacity 0.2s;
  }
  #clear-btn:hover { opacity: 1; color: #fff; }
</style>
</head>
<body>

<div id="top-bar">
  <select id="backend-select" disabled><option>—</option></select>
  <span id="status">Disconnected</span>
</div>

<!-- 连接表单 -->
<div id="connect-form">
  <h2>🔌 wsstunnel</h2>
  <input id="server-url" type="text" placeholder="wss://your-vps:443" value="" />
  <input id="token-input" type="text" placeholder="token (可选)" value="" />
  <button id="connect-btn">连接</button>
  <div id="error"></div>
</div>

<!-- 终端 -->
<div id="terminal" class="hidden"></div>

<!-- 清除存储按钮 -->
<button id="clear-btn">清除</button>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>

<script>
let ws = null;
let term = null;
let backends = [];

// --- localStorage 持久化 ---
const STORAGE_SERVER = 'wsstunnel_server';
const STORAGE_TOKEN = 'wsstunnel_token';

function loadStoredConfig() {
  const s = localStorage.getItem(STORAGE_SERVER);
  const t = localStorage.getItem(STORAGE_TOKEN);
  if (s) document.getElementById('server-url').value = s;
  if (t) document.getElementById('token-input').value = t;
}

function saveConfig(server, token) {
  if (server) localStorage.setItem(STORAGE_SERVER, server);
  if (token) localStorage.setItem(STORAGE_TOKEN, token);
}

function clearConfig() {
  localStorage.removeItem(STORAGE_SERVER);
  localStorage.removeItem(STORAGE_TOKEN);
  document.getElementById('server-url').value = '';
  document.getElementById('token-input').value = '';
  // 如果已连接则断开，回到表单
  if (ws) ws.close();
}

document.getElementById('clear-btn').addEventListener('click', clearConfig);

// --- 读取默认值：URL 参数优先，否则从 localStorage ---
const params = new URLSearchParams(window.location.search);
const hasUrlServer = !!params.get('server');
const hasUrlToken = !!params.get('token');

if (hasUrlServer) {
  document.getElementById('server-url').value = params.get('server');
} else {
  // 页面由 relay 自己提供时，自动推导 WebSocket 地址
  const loc = window.location;
  const wsProto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  document.getElementById('server-url').value = wsProto + '//' + loc.host + '/wstunnel';
}
if (hasUrlToken) document.getElementById('token-input').value = params.get('token');

if (!hasUrlServer && !hasUrlToken) {
  loadStoredConfig();
}

function setStatus(text, connected) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = connected ? 'connected' : '';
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

function connect() {
  let url = document.getElementById('server-url').value.trim();
  const token = document.getElementById('token-input').value.trim();

  if (!url) { showError('请输入服务器地址'); return; }
  // 统一 WebSocket 协议
  if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
  else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
  else if (!url.includes('://') && !url.startsWith('ws://') && !url.startsWith('wss://')) url = 'wss://' + url;
  if (token && !url.includes('?token=')) url += (url.includes('?') ? '&' : '?') + 'token=' + token;

  showError('');
  document.getElementById('connect-form').classList.add('hidden');
  setStatus('连接中...');

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('已连接', true);
    // 连接成功后保存配置到 localStorage
    saveConfig(document.getElementById('server-url').value.trim(), token);
    initTerminal();
    // 连接成功后获取后端列表
    setTimeout(() => ws.send('LIST'), 300);
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      // 文本帧 → relay 回复（后端列表、错误信息等）
      handleRelayText(e.data);
    } else {
      // 二进制帧 → PTY shell 输出
      if (term) term.write(new Uint8Array(e.data));
    }
  };

  ws.onclose = () => {
    setStatus('已断开');
    if (term) {
      term.dispose();
      term = null;
    }
    document.getElementById('connect-form').classList.remove('hidden');
  };

  ws.onerror = () => {
    showError('连接失败，请检查地址和网络');
    setStatus('连接失败');
    ws.close();
  };
}

// 处理 relay 文本回复
function handleRelayText(text) {
  // 后端列表更新
  if (text.startsWith('[Info] Connected backends:')) {
    const listStr = text.split(':').slice(1).join(':').trim();
    const sel = document.getElementById('backend-select');
    if (listStr === 'No backends connected' || !listStr) {
      sel.innerHTML = '<option>无后端</option>';
      sel.disabled = true;
    } else {
      backends = listStr.split(',').map(s => s.trim()).filter(s => s);
      sel.innerHTML = backends.map(b => {
        const current = b.endsWith(' *');
        const display = current ? b.slice(0, -2).trim() : b;
        const name = display.replace(/\s*\([^)]*\)$/, '');  // 去掉 (pty)/(pipe) 后缀
        return `<option value="${name}" ${current ? 'selected' : ''}>${display}</option>`;
      }).join('');
      sel.disabled = false;
    }
    document.getElementById('backend-select').style.display = '';
  }
  // 切换后端确认
  else if (text.startsWith('[Info] Switched to backend:')) {
    const name = text.split(':').slice(1).join(':').trim().split('(')[0].trim();
    const sel = document.getElementById('backend-select');
    for (let opt of sel.options) {
      if (opt.value === name) { opt.selected = true; break; }
    }
  }
  // 将文本回复也写入终端显示
  if (term) term.write(text + '\r\n');
}

function initTerminal() {
  document.getElementById('terminal').classList.remove('hidden');

  term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontSize: 14,
    fontFamily: 'Menlo, Monaco, "Fira Code", monospace',
    theme: {
      background: '#1a1a2e',
      foreground: '#e0e0e0',
      cursor: '#ffffff',
      selectionBackground: '#334466',
      black: '#282a36',
      red: '#ff5555',
      green: '#50fa7b',
      yellow: '#f1fa8c',
      blue: '#6272a4',
      magenta: '#ff79c6',
      cyan: '#8be9fd',
      white: '#f8f8f2',
    },
  });

  term.open(document.getElementById('terminal'));

  // 自适应容器大小
  function fitTerminal() {
    const el = document.getElementById('terminal');
    if (!el.clientHeight || !el.clientWidth) return setTimeout(fitTerminal, 100);
    // 尝试从 xterm 内部获取真实字符尺寸（最精确）
    let cw, ch;
    try {
      const dims = term._core?._renderService?.dimensions;
      if (dims?.actualCellWidth > 0 && dims?.actualCellHeight > 0) {
        cw = dims.actualCellWidth;
        ch = dims.actualCellHeight;
      }
    } catch {}
    // 回退：从 DOM 测量实际行高
    if (!ch) {
      const row = el.querySelector('.xterm-rows > div');
      if (row) {
        ch = row.clientHeight;
        cw = row.clientWidth / Math.max(1, term.cols);
      }
    }
    // 最终回退：根据字号估算
    if (!ch) { cw = 8.4; ch = 17; }
    const padding = 16;
    const cols = Math.max(20, Math.floor((el.clientWidth - padding) / cw));
    const rows = Math.max(5, Math.floor((el.clientHeight - padding) / ch));
    term.resize(cols, rows);
    // 强制 viewport 撑满容器（xterm 内联样式无法用 CSS 覆盖）
    const vp = el.querySelector('.xterm-viewport');
    if (vp) vp.style.height = el.clientHeight + 'px';
  }
  fitTerminal();

  // 窗口大小变化 → __RESIZE
  const sendResize = () => {
    fitTerminal();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(`__RESIZE:${term.rows},${term.cols}`);
    }
  };

  term.onResize(sendResize);
  window.addEventListener('resize', sendResize);
  setTimeout(sendResize, 500);

  // 粘贴事件：监听 textarea（xterm 实际接收输入的元素）
  term.textarea.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    if (text && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(text));
    }
  });

  // 按键输入 → WebSocket 二进制帧
  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(data));
    }
  });

  // IME 中文输入：beforeinput 在 xterm 处理前拦截，preventDefault 避免重复
  term.textarea.addEventListener('beforeinput', (e) => {
    if (e.inputType === 'insertFromComposition' && e.data) {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(e.data));
      }
    }
  });
}

// 后端选择器默认隐藏，收到后端列表后显示
document.getElementById('backend-select').style.display = 'none';
document.getElementById('backend-select').addEventListener('change', function() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send('USE ' + this.value);
  }
});

// 自动连接：URL 有参数，或 localStorage 有值时
const serverField = document.getElementById('server-url').value;
const tokenField = document.getElementById('token-input').value;
if (hasUrlServer || hasUrlToken || (serverField && tokenField)) {
  setTimeout(connect, 300);
}

document.getElementById('connect-btn').addEventListener('click', connect);
document.getElementById('server-url').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
document.getElementById('token-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
