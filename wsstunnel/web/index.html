<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wsstunnel - Web 终端</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
  #terminal { width: 100vw; height: 100vh; padding: 8px; }
  #terminal .xterm { height: 100%; }
  #terminal .xterm-viewport { height: 100% !important; }
  #top-bar {
    position: fixed; top: 0; right: 0;
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px; z-index: 10;
  }
  #status {
    font: 12px monospace;
    background: #e74c3c; color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
  }
  #status.connected { background: #2ecc71; }
  #backend-select {
    font: 12px/1.5 Menlo, Monaco, monospace;
    background: #16213e; color: #eee;
    border: 1px solid #0f3460; border-radius: 4px;
    padding: 2px 6px; outline: none;
    cursor: pointer;
  }
  #backend-select:disabled { opacity: 0.4; cursor: default; }
  #connect-form {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 16px;
    font-family: system-ui, sans-serif;
    color: #ccc;
  }
  #connect-form input, #connect-form button {
    padding: 10px 16px; font-size: 16px;
    border: 1px solid #444; border-radius: 6px;
    background: #16213e; color: #eee; width: 320px;
  }
  #connect-form button {
    background: #0f3460; color: #fff;
    cursor: pointer; font-weight: bold;
  }
  #connect-form button:hover { background: #1a4a8a; }
  .hidden { display: none !important; }
  #error { color: #e74c3c; font-size: 14px; }
  #clear-btn {
    position: fixed; bottom: 10px; right: 10px;
    background: #333; color: #999; border: none;
    border-radius: 4px; padding: 4px 10px;
    font: 12px system-ui, sans-serif;
    cursor: pointer; z-index: 20;
    opacity: 0.5; transition: opacity 0.2s;
  }
  #clear-btn:hover { opacity: 1; color: #fff; }

  /* ── 集群面板 ── */
  #cluster-btn {
    font: 12px monospace;
    background: #0f3460; color: #aaa;
    border: 1px solid #0f3460; border-radius: 4px;
    padding: 4px 8px; cursor: pointer;
  }
  #cluster-btn:hover { color: #fff; }
  #cluster-btn.active { background: #1a4a8a; color: #fff; }
  #cluster-panel {
    position: fixed; top: 0; right: 0;
    width: 380px; height: 100vh;
    background: #1a1a2e; border-left: 1px solid #333;
    z-index: 30; display: flex; flex-direction: column;
    font: 13px/1.5 system-ui, sans-serif; color: #ccc;
  }
  #cluster-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-bottom: 1px solid #333;
    font-weight: bold; color: #fff;
  }
  #cluster-close {
    background: none; border: none; color: #666; font-size: 16px;
    cursor: pointer; padding: 2px 6px;
  }
  #cluster-close:hover { color: #fff; }
  #cluster-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
  #cluster-table {
    width: 100%; border-collapse: collapse; margin-bottom: 16px;
  }
  #cluster-table th {
    text-align: left; padding: 6px 8px;
    border-bottom: 1px solid #333; color: #888; font-size: 11px;
    text-transform: uppercase;
  }
  #cluster-table td {
    padding: 6px 8px; border-bottom: 1px solid #222;
    font-family: Menlo, Monaco, monospace; font-size: 12px;
  }
  #cluster-table .name { color: #eee; }
  #cluster-table .mode {
    color: #888; font-size: 11px;
  }
  #cluster-table .status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 4px;
  }
  #cluster-table .status-dot.online { background: #2ecc71; }
  #cluster-table .status-dot.offline { background: #e74c3c; }
  .cluster-section {
    margin-bottom: 12px;
  }
  .cluster-section h4 {
    font-size: 11px; color: #888; text-transform: uppercase;
    margin-bottom: 8px; letter-spacing: 1px;
  }
  .cluster-row {
    display: flex; gap: 6px;
  }
  .cluster-row input,
  .cluster-row select {
    flex: 1; padding: 6px 8px; font-size: 12px;
    background: #16213e; color: #eee;
    border: 1px solid #333; border-radius: 4px; outline: none;
    font-family: Menlo, Monaco, monospace;
  }
  .cluster-row input:focus { border-color: #0f3460; }
  .cluster-row button {
    padding: 6px 12px; font-size: 12px;
    background: #0f3460; color: #eee;
    border: none; border-radius: 4px; cursor: pointer;
    white-space: nowrap;
  }
  .cluster-row button:hover { background: #1a4a8a; }
  .cluster-row select { cursor: pointer; }
</style>
</head>
<body>

<div id="top-bar">
  <select id="backend-select" disabled><option>—</option></select>
  <span id="status">Disconnected</span>
  <button id="cluster-btn" class="hidden">📊 集群</button>
</div>

<!-- 连接表单 -->
<div id="connect-form">
  <h2>🔌 wsstunnel</h2>
  <input id="server-url" type="text" placeholder="wss://your-vps:443" value="" />
  <input id="token-input" type="text" placeholder="token (可选)" value="" />
  <button id="connect-btn">连接</button>
  <div id="error"></div>
</div>

<!-- 终端 -->
<div id="terminal" class="hidden"></div>

<!-- 集群面板 -->
<div id="cluster-panel" class="hidden">
  <div id="cluster-header">
    <span>📊 集群仪表板</span>
    <button id="cluster-close">✕</button>
  </div>
  <div id="cluster-body">
    <table id="cluster-table">
      <thead><tr><th>后端</th><th>模式</th><th>运行时间</th><th>状态</th></tr></thead>
      <tbody id="cluster-tbody"></tbody>
    </table>
    <div class="cluster-section">
      <h4>@all 批量命令</h4>
      <div class="cluster-row">
        <input id="cluster-all-input" placeholder="发送给全部后端…" />
        <button id="cluster-all-btn">全部执行</button>
      </div>
    </div>
    <div class="cluster-section">
      <h4>单独发送</h4>
      <div class="cluster-row">
        <select id="cluster-single-select"><option>—</option></select>
        <input id="cluster-single-input" placeholder="命令…" />
        <button id="cluster-single-btn">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- 清除存储按钮 -->
<button id="clear-btn">清除</button>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>

<script>
let ws = null;
let term = null;
let backends = [];
let _mobileDup = '';
let _mobileDupTimer = null;

function mobileSend(text) {
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  _mobileDup = text;
  clearTimeout(_mobileDupTimer);
  _mobileDupTimer = setTimeout(() => { _mobileDup = ''; }, 300);
  ws.send(new TextEncoder().encode(text));
}

// --- localStorage 持久化 ---
const STORAGE_SERVER = 'wsstunnel_server';
const STORAGE_TOKEN = 'wsstunnel_token';

function loadStoredConfig() {
  const s = localStorage.getItem(STORAGE_SERVER);
  const t = localStorage.getItem(STORAGE_TOKEN);
  if (s) document.getElementById('server-url').value = s;
  if (t) document.getElementById('token-input').value = t;
}

function saveConfig(server, token) {
  if (server) localStorage.setItem(STORAGE_SERVER, server);
  if (token) localStorage.setItem(STORAGE_TOKEN, token);
}

function clearConfig() {
  localStorage.removeItem(STORAGE_SERVER);
  localStorage.removeItem(STORAGE_TOKEN);
  document.getElementById('server-url').value = '';
  document.getElementById('token-input').value = '';
  // 如果已连接则断开，回到表单
  if (ws) ws.close();
}

document.getElementById('clear-btn').addEventListener('click', clearConfig);

// --- 读取默认值：URL 参数优先，否则从 localStorage ---
const params = new URLSearchParams(window.location.search);
const hasUrlServer = !!params.get('server');
const hasUrlToken = !!params.get('token');

if (hasUrlServer) {
  document.getElementById('server-url').value = params.get('server');
} else {
  // 页面由 relay 自己提供时，自动推导 WebSocket 地址
  const loc = window.location;
  const wsProto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  document.getElementById('server-url').value = wsProto + '//' + loc.host + '/wstunnel';
}
if (hasUrlToken) document.getElementById('token-input').value = params.get('token');

if (!hasUrlServer && !hasUrlToken) {
  loadStoredConfig();
}

function setStatus(text, connected) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = connected ? 'connected' : '';
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

function connect() {
  let url = document.getElementById('server-url').value.trim();
  const token = document.getElementById('token-input').value.trim();

  if (!url) { showError('请输入服务器地址'); return; }
  // 统一 WebSocket 协议
  if (url.startsWith('https://')) url = 'wss://' + url.slice(8);
  else if (url.startsWith('http://')) url = 'ws://' + url.slice(7);
  else if (!url.includes('://') && !url.startsWith('ws://') && !url.startsWith('wss://')) url = 'wss://' + url;
  if (token && !url.includes('?token=')) url += (url.includes('?') ? '&' : '?') + 'token=' + token;

  showError('');
  document.getElementById('connect-form').classList.add('hidden');
  setStatus('连接中...');

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    const _connectedAt = Date.now();
    setStatus('已连接', true);
    clearInterval(window._uptimeTimer);
    window._uptimeTimer = setInterval(() => {
      const sec = Math.floor((Date.now() - _connectedAt) / 1000);
      const text = sec < 60 ? `已连接 ↑${sec}s` : sec < 3600 ? `已连接 ↑${Math.floor(sec/60)}m` : `已连接 ↑${Math.floor(sec/60/60)}h`;
      setStatus(text, true);
    }, 10000);
    // 连接成功后保存配置到 localStorage
    saveConfig(document.getElementById('server-url').value.trim(), token);
    initTerminal();
    // 连接成功后获取后端列表
    setTimeout(() => ws.send('LIST'), 300);
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      handleRelayText(e.data);
    } else {
      if (term) term.write(new Uint8Array(e.data));
    }
    // iOS 上 term.write 可能导致 textarea 失焦，确保焦点在 textarea 上
    if (term && term.textarea && document.activeElement !== term.textarea) {
      term.textarea.focus();
    }
  };

  ws.onclose = () => {
    clearInterval(window._uptimeTimer);
    setStatus('已断开');
    if (term) {
      term.dispose();
      term = null;
    }
    document.getElementById('connect-form').classList.remove('hidden');
  };

  ws.onerror = () => {
    showError('连接失败，请检查地址和网络');
    setStatus('连接失败');
    ws.close();
  };
}

// 处理 relay 文本回复
function handleRelayText(text) {
  // 后端列表更新（静默，不写终端）
  if (text.startsWith('[Info] Connected backends:')) {
    const firstLine = text.split('\n')[0];  // 只取第一行，忽略 [Info] Current:
    const listStr = firstLine.split(':').slice(1).join(':').trim();
    const sel = document.getElementById('backend-select');
    if (listStr === 'No backends connected' || !listStr) {
      sel.innerHTML = '<option>无后端</option>';
      sel.disabled = true;
    } else {
      backends = listStr.split(',').map(s => s.trim()).filter(s => s);
      sel.innerHTML = backends.map(b => {
        const current = b.endsWith(' *');
        const display = current ? b.slice(0, -2).trim() : b;
        const clean = display.replace(/ ↑[^ ]+/, '');
        const name = clean.replace(/\s*\([^)]*\)$/, '');
        return `<option value="${name}" ${current ? 'selected' : ''}>${display}</option>`;
      }).join('');
      sel.disabled = false;
    }
    document.getElementById('backend-select').style.display = '';
    return;  // ← 直接返回，不写终端
  }
  // 切换后端确认
  if (text.startsWith('[Info] Switched to backend:')) {
    const name = text.split(':').slice(1).join(':').trim().split('(')[0].trim();
    const sel = document.getElementById('backend-select');
    for (let opt of sel.options) {
      if (opt.value === name) { opt.selected = true; break; }
    }
  }
  // 其他文本回复写入终端
  if (term) term.write(text + '\r\n');
}

function initTerminal() {
  document.getElementById('terminal').classList.remove('hidden');

  term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontSize: 14,
    fontFamily: 'Menlo, Monaco, "Fira Code", monospace',
    theme: {
      background: '#1a1a2e',
      foreground: '#e0e0e0',
      cursor: '#ffffff',
      selectionBackground: '#334466',
      black: '#282a36',
      red: '#ff5555',
      green: '#50fa7b',
      yellow: '#f1fa8c',
      blue: '#6272a4',
      magenta: '#ff79c6',
      cyan: '#8be9fd',
      white: '#f8f8f2',
    },
  });

  term.open(document.getElementById('terminal'));

  // 自适应容器大小
  function fitTerminal() {
    const el = document.getElementById('terminal');
    if (!el.clientHeight || !el.clientWidth) return setTimeout(fitTerminal, 100);
    // 尝试从 xterm 内部获取真实字符尺寸（最精确）
    let cw, ch;
    try {
      const dims = term._core?._renderService?.dimensions;
      if (dims?.actualCellWidth > 0 && dims?.actualCellHeight > 0) {
        cw = dims.actualCellWidth;
        ch = dims.actualCellHeight;
      }
    } catch {}
    // 回退：从 DOM 测量实际行高
    if (!ch) {
      const row = el.querySelector('.xterm-rows > div');
      if (row) {
        ch = row.clientHeight;
        cw = row.clientWidth / Math.max(1, term.cols);
      }
    }
    // 最终回退：根据字号估算
    if (!ch) { cw = 8.4; ch = 17; }
    const padding = 16;
    const cols = Math.max(20, Math.floor((el.clientWidth - padding) / cw));
    const rows = Math.max(5, Math.floor((el.clientHeight - padding) / ch));
    term.resize(cols, rows);
    // 强制 viewport 撑满容器（xterm 内联样式无法用 CSS 覆盖）
    const vp = el.querySelector('.xterm-viewport');
    if (vp) vp.style.height = el.clientHeight + 'px';
  }
  fitTerminal();

  // 窗口大小变化 → __RESIZE
  const sendResize = () => {
    fitTerminal();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(`__RESIZE:${term.rows},${term.cols}`);
    }
  };

  term.onResize(sendResize);
  window.addEventListener('resize', sendResize);
  setTimeout(sendResize, 500);

  // 所有输入（键盘、IME 中文、粘贴）统一通过 xterm 的 onData 处理
  // 移动端去重：compositionend/paste 兜底可能先于 onData 发送
  term.onData((data) => {
    if (data && data === _mobileDup) { _mobileDup = ''; return; }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(data));
    }
  });

  // 移动端兜底：iOS 中文键盘用 insertText（非 insertFromComposition）
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    term.textarea.addEventListener('beforeinput', (e) => {
      if (e.data && (e.inputType === 'insertText' || e.inputType === 'insertFromComposition')) {
        mobileSend(e.data);
      }
    });
    term.textarea.addEventListener('paste', (e) => {
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      if (text) mobileSend(text);
    });
  }
}

// 后端选择器默认隐藏，收到后端列表后显示
document.getElementById('backend-select').style.display = 'none';
document.getElementById('backend-select').addEventListener('change', function() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send('USE ' + this.value);
  }
});

// ── 集群面板 ──
let _listTimer = null;

function renderCluster() {
  const tbody = document.getElementById('cluster-tbody');
  const sel = document.getElementById('cluster-single-select');
  tbody.innerHTML = backends.map(b => {
    const current = b.endsWith(' *');
    const display = current ? b.slice(0, -2).trim() : b;
    const uptime = display.match(/ ↑([^ ]+)/)?.[1] || '';
    const clean = display.replace(/ ↑[^ ]+/, '');
    const name = clean.replace(/\s*\([^)]*\)$/, '');
    const mode = clean.match(/\(([^)]+)\)/)?.[1] || '?';
    return `<tr>
      <td class="name">${current ? '<b>' : ''}${name}${current ? '</b>' : ''}</td>
      <td class="mode">${mode}</td>
      <td>${uptime || '—'}</td>
      <td><span class="status-dot online"></span></td>
    </tr>`;
  }).join('');
  sel.innerHTML = backends.map(b => {
    const n = b.replace(/ ↑[^ ]+/, '').replace(/\s*\*$/, '').replace(/\s*\([^)]*\)$/, '').trim();
    return `<option value="${n}">${n}</option>`;
  }).join('');
  document.getElementById('cluster-btn').classList.remove('hidden');
}

function stripBackendName(b) {
  return b.replace(/ ↑[^ ]+/, '').replace(/\s*\*$/, '').replace(/\s*\([^)]*\)$/, '').trim();
}

// 监听后端列表更新（handleRelayText 已更新 backends）
const _origHandle = handleRelayText;
handleRelayText = function(text) {
  _origHandle(text);
  if (text.startsWith('[Info] Connected backends:')) {
    renderCluster();
    clearInterval(_listTimer);
    _listTimer = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('LIST');
    }, 10000);
  }
};

document.getElementById('cluster-btn').addEventListener('click', function() {
  const p = document.getElementById('cluster-panel');
  const opening = p.classList.contains('hidden');
  p.classList.toggle('hidden');
  this.classList.toggle('active');
  if (opening && ws && ws.readyState === WebSocket.OPEN) ws.send('LIST');
});
document.getElementById('cluster-close').addEventListener('click', function() {
  document.getElementById('cluster-panel').classList.add('hidden');
  document.getElementById('cluster-btn').classList.remove('active');
});

// @all 批量执行
document.getElementById('cluster-all-btn').addEventListener('click', function() {
  const cmd = document.getElementById('cluster-all-input').value.trim();
  if (!cmd || !ws || ws.readyState !== WebSocket.OPEN) return;
  backends.forEach((b, i) => {
    const name = b.replace(/ ↑[^ ]+/, '').replace(/\s*\*$/, '').replace(/\s*\([^)]*\)$/, '').trim();
    setTimeout(() => ws.send(`@${name} ${cmd}`), i * 200);
  });
  document.getElementById('cluster-all-input').value = '';
  term.write(`\r\n╔════ @all: ${cmd} ═══════════════╗\r\n`);
});
document.getElementById('cluster-all-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('cluster-all-btn').click();
});

// 单独发送
document.getElementById('cluster-single-btn').addEventListener('click', function() {
  const sel = document.getElementById('cluster-single-select');
  const cmd = document.getElementById('cluster-single-input').value.trim();
  if (!sel.value || !cmd || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(`@${sel.value} ${cmd}`);
  document.getElementById('cluster-single-input').value = '';
  term.write(`\r\n📡 @${sel.value}: ${cmd}\r\n`);
});
document.getElementById('cluster-single-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('cluster-single-btn').click();
});

// 自动连接：URL 有参数，或 localStorage 有值时
const serverField = document.getElementById('server-url').value;
const tokenField = document.getElementById('token-input').value;
if (hasUrlServer || hasUrlToken || (serverField && tokenField)) {
  setTimeout(connect, 300);
}

document.getElementById('connect-btn').addEventListener('click', connect);
document.getElementById('server-url').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
document.getElementById('token-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
