<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wsstunnel - Web 终端</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1a2e; }
  #terminal { height: 100vh; padding: 8px; }
  #status {
    position: fixed; top: 0; right: 0;
    padding: 4px 10px; font: 12px monospace;
    background: #e74c3c; color: #fff;
    border-radius: 0 0 0 4px; z-index: 10;
  }
  #status.connected { background: #2ecc71; }
  #connect-form {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 16px;
    font-family: system-ui, sans-serif;
    color: #ccc;
  }
  #connect-form input, #connect-form button {
    padding: 10px 16px; font-size: 16px;
    border: 1px solid #444; border-radius: 6px;
    background: #16213e; color: #eee; width: 320px;
  }
  #connect-form button {
    background: #0f3460; color: #fff;
    cursor: pointer; font-weight: bold;
  }
  #connect-form button:hover { background: #1a4a8a; }
  .hidden { display: none !important; }
  #error { color: #e74c3c; font-size: 14px; }
</style>
</head>
<body>

<div id="status">Disconnected</div>

<!-- 连接表单 -->
<div id="connect-form">
  <h2>🔌 wsstunnel</h2>
  <input id="server-url" type="text" placeholder="wss://your-vps:443" value="" />
  <input id="token-input" type="text" placeholder="token (可选)" value="" />
  <button id="connect-btn">连接</button>
  <div id="error"></div>
</div>

<!-- 终端 -->
<div id="terminal" class="hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
<script>
let ws = null;
let term = null;

// 从 URL 参数读取默认值
const params = new URLSearchParams(window.location.search);
if (params.get('server')) document.getElementById('server-url').value = params.get('server');
if (params.get('token')) document.getElementById('token-input').value = params.get('token');

function setStatus(text, connected) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = connected ? 'connected' : '';
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

function connect() {
  let url = document.getElementById('server-url').value.trim();
  const token = document.getElementById('token-input').value.trim();

  if (!url) { showError('请输入服务器地址'); return; }
  if (!url.startsWith('ws://') && !url.startsWith('wss://')) url = 'wss://' + url;
  if (token && !url.includes('?token=')) url += (url.includes('?') ? '&' : '?') + 'token=' + token;

  showError('');
  document.getElementById('connect-form').classList.add('hidden');
  setStatus('连接中...');

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('已连接', true);
    initTerminal();
  };

  ws.onmessage = (e) => {
    if (term) term.write(new Uint8Array(e.data));
  };

  ws.onclose = () => {
    setStatus('已断开');
    if (term) {
      term.dispose();
      term = null;
    }
    document.getElementById('connect-form').classList.remove('hidden');
  };

  ws.onerror = () => {
    showError('连接失败，请检查地址和网络');
    setStatus('连接失败');
    ws.close();
  };
}

function initTerminal() {
  document.getElementById('terminal').classList.remove('hidden');

  term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    fontSize: 14,
    fontFamily: 'Menlo, Monaco, "Fira Code", monospace',
    theme: {
      background: '#1a1a2e',
      foreground: '#e0e0e0',
      cursor: '#ffffff',
      selectionBackground: '#334466',
      black: '#282a36',
      red: '#ff5555',
      green: '#50fa7b',
      yellow: '#f1fa8c',
      blue: '#6272a4',
      magenta: '#ff79c6',
      cyan: '#8be9fd',
      white: '#f8f8f2',
    },
  });

  term.open(document.getElementById('terminal'));

  // 窗口大小变化 → __RESIZE
  const sendResize = () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(`__RESIZE:${term.rows},${term.cols}`);
    }
  };

  term.onResize(sendResize);
  window.addEventListener('resize', sendResize);
  setTimeout(sendResize, 500);

  // 按键输入 → WebSocket 二进制帧
  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(data));
    }
  });
}

// 自动连接（URL 中有参数时）
if (params.get('server')) {
  setTimeout(connect, 300);
}

document.getElementById('connect-btn').addEventListener('click', connect);
document.getElementById('server-url').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
document.getElementById('token-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});
</script>
</body>
</html>
